const DB = {
  add: async (table, item) => {
    const { data, error } = await _sb.from(table).insert([item]).select();
    if (error) throw error;
    return data?.[0];
  },
  query: async (table, from, to, proj) => {
    let q = _sb.from(table).select('*').gte('date', from).lte('date', to);
    if (proj && proj !== 'Todos') q = q.eq('project', proj);
    const { data, error } = await q.order('date', { ascending: false });
    if (error) throw error;
    return data || [];
  },
  del: async (table, id) => {
    const { error } = await _sb.from(table).delete().eq('id', id);
    if (error) throw error;
  },
  getMeta: async (key) => {
    const { data } = await _sb.from('metas').select('valor').eq('meta_key', key).maybeSingle();
    return data?.valor ?? 10;
  },
  saveMeta: async (key, val) => {
    const { error } = await _sb.from('metas').upsert(
      { meta_key: key, valor: val, updated_at: new Date().toISOString() },
      { onConflict: 'meta_key' }
    );
    if (error) throw error;
  },
};

function HabitCalendar({ collection, project, refreshKey }) {
  const now = new Date();
  const [viewYear,setViewYear]   = useState(now.getFullYear());
  const [viewMonth,setViewMonth] = useState(now.getMonth());
  const [records,setRecords]     = useState([]);
  const [loading,setLoading]     = useState(false);
  const todayStr    = today();
  const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
  const firstDow    = new Date(viewYear,viewMonth,1).getDay();

  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      setLoading(true);
      const f = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-01`;
      const t = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
      try { const data = await DB.query(collection,f,t,'Todos'); if (!cancelled) setRecords(data); }
      catch(e) { console.error(e); }
      if (!cancelled) setLoading(false);
    };
    load(); return () => { cancelled=true; };
  }, [collection,project,refreshKey,viewYear,viewMonth,daysInMonth]);

  const checkProjects = project==='Todos' ? PROJECTS : [project];
  const byDate = {};
  records.forEach(r => {
    const d=(r.date||'').slice(0,10);
    if (!byDate[d]) byDate[d]=new Set();
    byDate[d].add(r.project);
  });
  const getStatus = (n) => {
    const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`;
    if (ds>todayStr) return 'future';
    if (ds===todayStr) return 'today';
    const done=byDate[ds]||new Set();
    const rec=checkProjects.filter(p=>done.has(p)).length;
    if (rec===0) return 'missed';
    if (rec===checkProjects.length) return 'done';
    return 'partial';
  };
  const statusColor = {done:'#007272',partial:'#D97706',missed:'#DC2626',today:C.sage,future:'#D1D5DB'};
  const statusLabel = {done:'Completo',partial:'Parcial',missed:'Sin registro',today:'Hoy',future:'Pendiente'};
  const counts = {done:0,partial:0,missed:0};
  for (let d=1;d<=daysInMonth;d++) { const s=getStatus(d); if (s in counts) counts[s]++; }
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const isCurrent = viewYear===now.getFullYear() && viewMonth===now.getMonth();
  const prevM = () => { if (viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1); };
  const nextM = () => { if (isCurrent) return; if (viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1); };

  return (
    <div style={{background:'white',borderRadius:'12px',padding:'20px',marginTop:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
        <div style={{fontWeight:'700',fontSize:'15px',color:C.dark}}>Registro del Mes</div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <button onClick={prevM} style={{background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:C.medium,padding:'0 4px',lineHeight:1}}>&#8249;</button>
          <span style={{fontWeight:'600',fontSize:'14px',color:C.dark,minWidth:'120px',textAlign:'center'}}>{months[viewMonth]} {viewYear}</span>
          <button onClick={nextM} style={{background:'none',border:'none',cursor:isCurrent?'not-allowed':'pointer',fontSize:'18px',color:isCurrent?'#D1D5DB':C.medium,padding:'0 4px',lineHeight:1}}>&#8250;</button>
        </div>
      </div>
      {loading ? <Spinner /> : <>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'6px'}}>
          {['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>(
            <div key={d} style={{textAlign:'center',fontSize:'11px',fontWeight:'600',color:'#9CA3AF',padding:'2px 0'}}>{d}</div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px'}}>
          {Array.from({length:firstDow}).map((_,i)=><div key={'e'+i}/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const n=i+1; const status=getStatus(n);
            const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`;
            return (
              <div key={n} title={statusLabel[status]} style={{
                aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%',
                background:status==='future'?'transparent':statusColor[status],
                border:ds===todayStr?`2px solid ${C.medium}`:'2px solid transparent',
                color:status==='future'?'#9CA3AF':(status==='today'?C.dark:'white'),
                fontSize:'12px',fontWeight:ds===todayStr?'700':'500',cursor:'default',
              }}>{n}</div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:'16px',marginTop:'16px',flexWrap:'wrap'}}>
          {[{key:'done',label:`Completo (${counts.done})`},{key:'partial',label:`Parcial (${counts.partial})`},{key:'missed',label:`Sin registro (${counts.missed})`}].map(({key,label})=>(
            <div key={key} style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <div style={{width:'12px',height:'12px',borderRadius:'50%',background:statusColor[key]}}/>
              <span style={{fontSize:'12px',color:'#6B7280'}}>{label}</span>
            </div>
          ))}
        </div>
      </>}
    </div>
  );
}

            <tbody>
              {records.map(r=>(
                <tr key={r.id} style={{borderBottom:`1px solid ${C.sageLight}`}}>
                  <td style={{padding:'8px 10px',color:C.dark}}>{r.project}</td>
                  <td style={{padding:'8px 10px',color:'#6B7280'}}>{fmt(r.date)}</td>
                  <td style={{padding:'8px 10px',fontWeight:'700',color:C.medium}}>{r.ventas}</td>
                  <td style={{padding:'8px 10px'}}>
                    <button onClick={()=>del(r.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#EF4444',fontSize:'12px'}}>Eliminar</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function DashboardTab() {
  const [proj,setProj]     = useState('Todos');
  const [from,setFrom]     = useState(()=>{ const d=new Date(); d.setDate(1); return d.toISOString().slice(0,10); });
  const [to,setTo]         = useState(today());
  const [meta,setMeta]     = useState(10);
  const [loading,setLoading] = useState(false);
  const [visitas,setVisitas] = useState([]);
  const [leads,setLeads]   = useState([]);
  const [ventas,setVentas] = useState([]);
  const metaKey = `${from.slice(0,7)}-${proj}`;

  useEffect(()=>{
    let cancelled=false;
    const load=async()=>{
      setLoading(true);
      try {
        const [v,l,s]=await Promise.all([
          DB.query('visitas',from,to,proj),
          DB.query('leads',from,to,proj),
          DB.query('ventas',from,to,proj),
        ]);
        if (!cancelled){ setVisitas(v); setLeads(l); setVentas(s); }
      } catch(e){ console.error(e); }
      if (!cancelled) setLoading(false);
    };
    load(); return ()=>{ cancelled=true; };
  },[from,to,proj]);

  useEffect(()=>{ DB.getMeta(metaKey).then(v=>setMeta(v)).catch(()=>{}); },[metaKey]);

  const handleMeta = async (val)=>{ setMeta(val); try{ await DB.saveMeta(metaKey,val); }catch(e){ console.error(e); } };

  const totLeads       = leads.reduce((s,r)=>s+(r.keybe||0)+(r.sico||0),0);
  const totProspectos  = visitas.reduce((s,r)=>s+(r.prospectos||0),0);
  const totCompradores = visitas.reduce((s,r)=>s+(r.compradores||0),0);
  const totVentas      = ventas.reduce((s,r)=>s+(r.ventas||0),0);
  const maxFunnel      = Math.max(totLeads,totProspectos,totVentas,1);

  const byProject = PROJECTS.map(p=>{
    const vR=visitas.filter(r=>r.project===p), lR=leads.filter(r=>r.project===p), sR=ventas.filter(r=>r.project===p);
    return {p,
      l:  lR.reduce((s,r)=>s+(r.keybe||0)+(r.sico||0),0),
      pr: vR.reduce((s,r)=>s+(r.prospectos||0),0),
      c:  vR.reduce((s,r)=>s+(r.compradores||0),0),
      s:  sR.reduce((s,r)=>s+(r.ventas||0),0),
    };
  }).filter(x=>x.l>0||x.pr>0||x.c>0||x.s>0);

  const sel = {padding:'8px 12px',borderRadius:'8px',border:`1.5px solid ${C.sage}`,fontSize:'14px',color:C.dark,background:'white'};
  return (
    <div>
      <div style={{background:'white',borderRadius:'12px',padding:'16px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:'12px',alignItems:'flex-end'}}>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>PROYECTO</label>
            <select value={proj} onChange={e=>setProj(e.target.value)} style={sel}>
              <option value="Todos">Todos</option>
              {PROJECTS.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>DESDE</label>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={sel}/>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>HASTA</label>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={sel}/>
          </div>
        </div>
      </div>

      {loading ? <Spinner/> : <>
        <div style={{display:'flex',flexWrap:'wrap',gap:'12px',marginBottom:'20px'}}>
          <KpiCard label="Total Leads"     value={totLeads}       color={C.light}/>
          <KpiCard label="Prospectos"      value={totProspectos}  color={C.medium}/>
          <KpiCard label="Compradores"     value={totCompradores} color={C.dark}/>
          <KpiCard label="Ventas Cerradas" value={totVentas}      color="#D97706"/>
        </div>

        <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
          <div style={{fontWeight:'700',color:C.dark,marginBottom:'20px',fontSize:'15px'}}>Funnel de Conversion</div>
          <FunnelBar label="Leads" value={totLeads} max={maxFunnel} color={C.light}/>
          <FunnelBar label="Prospectos (visitas)" value={totProspectos} max={maxFunnel} color={C.medium}
            pctLabel={`${pct(totProspectos,totLeads)}% de leads llegaron a visita`}/>
          <FunnelBar label="Ventas Cerradas" value={totVentas} max={maxFunnel} color="#D97706"
            pctLabel={`${pct(totVentas,totProspectos)}% de prospectos cerraron venta`}/>
        </div>

        <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
          <div style={{fontWeight:'700',color:C.dark,marginBottom:'16px',fontSize:'15px'}}>Tasas de Conversion</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'12px'}}>
            {[
              {label:'Leads → Visitas',  val:pct(totProspectos,totLeads),  sub:`${totProspectos} de ${totLeads}`},
              {label:'Visitas → Ventas', val:pct(totVentas,totProspectos), sub:`${totVentas} de ${totProspectos}`},
              {label:'Leads → Ventas',   val:pct(totVentas,totLeads),      sub:`${totVentas} de ${totLeads}`},
            ].map(({label,val,sub})=>(
              <div key={label} style={{flex:'1',minWidth:'150px',background:C.sageLight,borderRadius:'12px',padding:'16px 20px',textAlign:'center'}}>
                <div style={{fontSize:'11px',color:'#6B7280',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>{label}</div>
                <div style={{fontSize:'36px',fontWeight:'900',color:C.dark,lineHeight:'1'}}>{val}%</div>
                <div style={{fontSize:'12px',color:'#9CA3AF',marginTop:'6px'}}>{sub}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
          <div style={{fontWeight:'700',color:C.dark,marginBottom:'16px',fontSize:'15px'}}>Calculadora de Meta</div>
          <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
            <label style={{fontSize:'14px',fontWeight:'600',color:C.dark}}>Meta de ventas:</label>
            <input type="number" min="1" value={meta} onChange={e=>handleMeta(Number(e.target.value))}
              style={{width:'80px',padding:'8px',borderRadius:'8px',border:`1.5px solid ${C.sage}`,fontSize:'18px',fontWeight:'700',textAlign:'center',color:C.dark}}/>
            <span style={{fontSize:'12px',color:'#9CA3AF'}}>Guardado para {from.slice(0,7)} · {proj}</span>
          </div>
          <div style={{marginTop:'16px',display:'flex',flexWrap:'wrap',gap:'12px'}}>
            {[
              {label:'Leads necesarios',  val:totVentas>0?Math.ceil(meta*totLeads/totVentas):'—'},
              {label:'Visitas necesarias', val:totVentas>0?Math.ceil(meta*totProspectos/totVentas):'—'},
              {label:'Avance actual',      val:`${totVentas} / ${meta}`},
              {label:'Faltan',             val:Math.max(0,meta-totVentas)},
            ].map(({label,val})=>(
              <div key={label} style={{background:C.sageLight,borderRadius:'10px',padding:'14px 18px',flex:'1',minWidth:'120px'}}>
                <div style={{fontSize:'11px',color:'#6B7280',fontWeight:'600',textTransform:'uppercase',marginBottom:'4px'}}>{label}</div>
                <div style={{fontSize:'22px',fontWeight:'800',color:C.dark}}>{val}</div>
              </div>
            ))}
          </div>
        </div>

        {byProject.length>0 ? (
          <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)'}}>
            <div style={{fontWeight:'700',color:C.dark,marginBottom:'16px',fontSize:'15px'}}>Comparativo por Proyecto</div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                <thead><tr style={{background:C.sageLight}}>
                  {['Proyecto','Leads','Prospectos','Compradores','Ventas','L→V','V→C'].map(h=>(
                    <th key={h} style={{padding:'10px 12px',textAlign:'left',fontWeight:'700',color:C.dark}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {byProject.map(({p,l,pr,c,s})=>(
                    <tr key={p} style={{borderBottom:`1px solid ${C.sageLight}`}}>
                      <td style={{padding:'10px 12px',fontWeight:'600',color:C.dark}}>{p}</td>
                      <td style={{padding:'10px 12px',color:C.light,fontWeight:'700'}}>{l}</td>
                      <td style={{padding:'10px 12px',color:C.medium,fontWeight:'700'}}>{pr}</td>
                      <td style={{padding:'10px 12px',color:C.dark,fontWeight:'700'}}>{c}</td>
                      <td style={{padding:'10px 12px',color:'#D97706',fontWeight:'700'}}>{s}</td>
                      <td style={{padding:'10px 12px',color:'#6B7280'}}>{pct(pr,l)}%</td>
                      <td style={{padding:'10px 12px',color:'#6B7280'}}>{pct(s,pr)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ) : (
          <div style={{textAlign:'center',padding:'48px',color:'#9CA3AF',fontSize:'15px'}}>
            No hay datos para el rango y proyecto seleccionado.
            <br/><span style={{fontSize:'13px'}}>Ingresa registros en Visitas, Leads y Ventas.</span>
          </div>
        )}
      </>}
    </div>
  );
}

const TABS = [{id:'visitas',label:'Visitas'},{id:'leads',label:'Leads'},{id:'ventas',label:'Ventas'},{id:'dashboard',label:'Dashboard'}];

function App() {
  const [tab,setTab] = useState('visitas');
  return (
    <div style={{minHeight:'100vh',background:C.cream}}>
      <div style={{background:C.dark,padding:'16px 24px',boxShadow:'0 2px 8px rgba(26,77,92,0.25)'}}>
        <div style={{maxWidth:'780px',margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <TGLogo/>
          <div style={{fontSize:'11px',color:'rgba(200,213,200,0.7)',fontWeight:'500',letterSpacing:'0.5px',textAlign:'right'}}>
            Funnel de Ventas<br/><span style={{fontSize:'10px'}}>v2.0 — Supabase</span>
          </div>
        </div>
      </div>
      <div style={{background:C.dark,borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{maxWidth:'780px',margin:'0 auto',display:'flex'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:'13px 8px',border:'none',cursor:'pointer',
              fontSize:'13px',fontWeight:'700',letterSpacing:'0.3px',
              background:tab===t.id?C.medium:'transparent',
              color:tab===t.id?'white':'rgba(200,213,200,0.65)',
              borderBottom:tab===t.id?`3px solid ${C.light}`:'3px solid transparent',
              transition:'all 0.15s',
            }}>{t.label}</button>
          ))}
        </div>
      </div>
      <div style={{maxWidth:'780px',margin:'0 auto',padding:'24px 16px'}}>
        {tab==='visitas'   && <VisitasTab/>}
        {tab==='leads'     && <LeadsTab/>}
        {tab==='ventas'    && <VentasTab/>}
        {tab==='dashboard' && <DashboardTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
