const DB = {
  add: async (table, item) => {
    const { data, error } = await _sb.from(table).insert([item]).select();
    if (error) throw error;
    return data?.[0];
  },
  query: async (table, from, to, proj) => {
    let q = _sb.from(table).select('*').gte('date', from).lte('date', to);
    if (proj && proj !== 'Todos') q = q.eq('project', proj);
    const { data, error } = await q.order('date', { ascending: false });
    if (error) throw error;
    return data || [];
  },
  del: async (table, id) => {
    const { error } = await _sb.from(table).delete().eq('id', id);
    if (error) throw error;
  },
  getMeta: async (key) => {
    const { data } = await _sb.from('metas').select('valor').eq('meta_key', key).maybeSingle();
    return data?.valor ?? 0;
  },
  saveMeta: async (key, val) => {
    const { error } = await _sb.from('metas').upsert(
      { meta_key: key, valor: val, updated_at: new Date().toISOString() },
      { onConflict: 'meta_key' }
    );
    if (error) throw error;
  },
  getMetasBatch: async (keys) => {
    const { data } = await _sb.from('metas').select('meta_key,valor').in('meta_key', keys);
    const result = {};
    (data || []).forEach(r => { result[r.meta_key] = r.valor; });
    return result;
  },
};

function HabitCalendar({ project, refreshKey }) {
  const now = new Date();
  const [viewYear,setViewYear]     = useState(now.getFullYear());
  const [viewMonth,setViewMonth]   = useState(now.getMonth());
  const [visitasRec,setVisitasRec] = useState([]);
  const [leadsRec,setLeadsRec]     = useState([]);
  const [loading,setLoading]       = useState(false);
  const todayStr    = today();
  const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
  const firstDow    = new Date(viewYear,viewMonth,1).getDay();

  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      setLoading(true);
      const f = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-01`;
      const t = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
      try {
        const [vData, lData] = await Promise.all([
          DB.query('visitas', f, t, 'Todos'),
          DB.query('leads',   f, t, 'Todos'),
        ]);
        if (!cancelled) { setVisitasRec(vData); setLeadsRec(lData); }
      } catch(e) { console.error(e); }
      if (!cancelled) setLoading(false);
    };
    load(); return () => { cancelled=true; };
  }, [project, refreshKey, viewYear, viewMonth, daysInMonth]);

  const checkProjects = project==='Todos' ? PROJECTS : [project];

  // Índice: qué proyectos registraron visitas / leads por fecha
  const visitasByDate = {};
  visitasRec.forEach(r => {
    const d=(r.date||'').slice(0,10);
    if (!visitasByDate[d]) visitasByDate[d]=new Set();
    visitasByDate[d].add(r.project);
  });
  const leadsByDate = {};
  leadsRec.forEach(r => {
    const d=(r.date||'').slice(0,10);
    if (!leadsByDate[d]) leadsByDate[d]=new Set();
    leadsByDate[d].add(r.project);
  });

  // Completo = proyecto tiene registro en AMBAS tablas ese día
  const getStatus = (n) => {
    const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`;
    if (ds > todayStr) return 'future';
    const vSet = visitasByDate[ds] || new Set();
    const lSet = leadsByDate[ds]   || new Set();
    const withBoth = checkProjects.filter(p => vSet.has(p) && lSet.has(p)).length;
    const withAny  = checkProjects.filter(p => vSet.has(p) || lSet.has(p)).length;
    if (withBoth === checkProjects.length) return 'done';
    if (withAny  > 0)                      return 'partial';
    return 'missed';
  };

  const statusColor = {done:'#007272', partial:'#D97706', missed:'#DC2626', future:'#D1D5DB'};
  const statusLabel = {done:'Completo (visitas + prospectos)', partial:'Parcial (falta un registro)', missed:'Sin registro', future:'Pendiente'};
  const counts = {done:0, partial:0, missed:0};
  for (let d=1; d<=daysInMonth; d++) { const s=getStatus(d); if (s in counts) counts[s]++; }
  const isCurrent = viewYear===now.getFullYear() && viewMonth===now.getMonth();
  const prevM = () => { if (viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1); };
  const nextM = () => { if (isCurrent) return; if (viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1); };

  return (
    <div style={{background:'white',borderRadius:'12px',padding:'20px',marginTop:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
        <div>
          <div style={{fontWeight:'700',fontSize:'15px',color:C.dark}}>Registro del Mes</div>
          <div style={{fontSize:'11px',color:'#9CA3AF',marginTop:'2px'}}>✓ Completo = visitas + prospectos registrados</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <button onClick={prevM} style={{background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:C.medium,padding:'0 4px',lineHeight:1}}>&#8249;</button>
          <span style={{fontWeight:'600',fontSize:'14px',color:C.dark,minWidth:'120px',textAlign:'center'}}>{MONTHS_ES[viewMonth]} {viewYear}</span>
          <button onClick={nextM} style={{background:'none',border:'none',cursor:isCurrent?'not-allowed':'pointer',fontSize:'18px',color:isCurrent?'#D1D5DB':C.medium,padding:'0 4px',lineHeight:1}}>&#8250;</button>
        </div>
      </div>
      {loading ? <Spinner /> : <>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'6px'}}>
          {['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>(
            <div key={d} style={{textAlign:'center',fontSize:'11px',fontWeight:'600',color:'#9CA3AF',padding:'2px 0'}}>{d}</div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px'}}>
          {Array.from({length:firstDow}).map((_,i)=><div key={'e'+i}/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const n=i+1; const status=getStatus(n);
            const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`;
            const isToday = ds===todayStr;
            return (
              <div key={n} title={statusLabel[status]} style={{
                aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%',
                background:status==='future'?'transparent':statusColor[status],
                border:isToday?`3px solid ${C.dark}`:'2px solid transparent',
                color:status==='future'?'#9CA3AF':'white',
                fontSize:'12px',fontWeight:isToday?'900':'500',cursor:'default',
              }}>{n}</div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:'16px',marginTop:'16px',flexWrap:'wrap'}}>
          {[{key:'done',label:`Completo (${counts.done})`},{key:'partial',label:`Parcial (${counts.partial})`},{key:'missed',label:`Sin registro (${counts.missed})`}].map(({key,label})=>(
            <div key={key} style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <div style={{width:'12px',height:'12px',borderRadius:'50%',background:statusColor[key]}}/>
              <span style={{fontSize:'12px',color:'#6B7280'}}>{label}</span>
            </div>
          ))}
        </div>
      </>}
    </div>
  );
}

                    <td style={{padding:'8px 10px',fontWeight:'700',color:C.medium,textAlign:'center'}}>{r.sico}</td>

}

function VentasTab() {
  const [project,setProject] = useState(PROJECTS[0]);
  const [date,setDate]       = useState(weekStart());
  const [ventas,setVentas]   = useState(0);
  const [saving,setSaving]   = useState(false);
  const [saved,setSaved]     = useState(false);
  const [records,setRecords] = useState([]);
  const [loading,setLoading] = useState(true);

  const loadRecords = useCallback(async () => {
    setLoading(true);
    try { const data=await DB.query('ventas','2020-01-01',today(),project); setRecords(data.slice(0,20)); }
    catch(e) { console.error(e); }
    setLoading(false);
  },[project]);
  useEffect(()=>{ loadRecords(); },[loadRecords]);

  const save = async () => {
    setSaving(true);
    try {
      await DB.add('ventas',{project,date,ventas:Number(ventas)});
      setSaved(true); setVentas(0); await loadRecords();
      setTimeout(()=>setSaved(false),2500);
    } catch(e) { alert('Error: '+e.message); }
    setSaving(false);
  };
  const del = async (id) => { try { await DB.del('ventas',id); await loadRecords(); } catch(e) { alert(e.message); } };

  const inp = {width:'100%',padding:'10px 12px',borderRadius:'8px',border:`1.5px solid ${C.sage}`,fontSize:'14px',color:C.dark};
  return (
    <div>
      <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
          <div>
            <label style={{fontSize:'13px',fontWeight:'600',color:C.dark,display:'block',marginBottom:'6px'}}>Proyecto</label>
            <select value={project} onChange={e=>setProject(e.target.value)} style={{...inp,background:'white'}}>
              {PROJECTS.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:'13px',fontWeight:'600',color:C.dark,display:'block',marginBottom:'6px'}}>Semana (fecha de corte)</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp}/>
          </div>
        </div>
        <div style={{marginBottom:'20px'}}>
          <label style={{fontSize:'13px',fontWeight:'600',color:C.dark,display:'block',marginBottom:'6px'}}>Numero de ventas cerradas</label>
          <input type="number" min="0" value={ventas} onChange={e=>setVentas(e.target.value)}
            style={{...inp,fontSize:'28px',fontWeight:'700',textAlign:'center',padding:'12px'}}/>
        </div>
        <button onClick={save} disabled={saving} style={{width:'100%',padding:'14px',
          background:saved?C.medium:saving?'#6B9FAC':C.dark,color:'white',border:'none',
          borderRadius:'10px',fontSize:'15px',fontWeight:'700',cursor:saving?'not-allowed':'pointer'}}>
          {saved?'¡Guardado!':saving?'Guardando...':'Guardar Cierre Semanal'}
        </button>
      </div>
      {loading ? <Spinner/> : records.length>0 && (
        <div style={{background:'white',borderRadius:'12px',padding:'20px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)'}}>
          <div style={{fontWeight:'700',color:C.dark,marginBottom:'12px',fontSize:'14px'}}>Registros recientes</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
            <thead><tr style={{background:C.sageLight}}>
              {['Proyecto','Fecha','Ventas',''].map(h=>(
                <th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:'600',color:C.dark}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {records.map(r=>(
                <tr key={r.id} style={{borderBottom:`1px solid ${C.sageLight}`}}>
                  <td style={{padding:'8px 10px',color:C.dark}}>{r.project}</td>
                  <td style={{padding:'8px 10px',color:'#6B7280'}}>{fmt(r.date)}</td>
                  <td style={{padding:'8px 10px',fontWeight:'700',color:C.medium}}>{r.ventas}</td>
                  <td style={{padding:'8px 10px'}}>
                    <button onClick={()=>del(r.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#EF4444',fontSize:'12px'}}>Eliminar</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function DashboardTab({ onGoToMetas }) {
  const [proj,setProj]     = useState('Todos');
  const [from,setFrom]     = useState(()=>{ const d=new Date(); d.setDate(1); return d.toISOString().slice(0,10); });
  const [to,setTo]         = useState(today());
  const [meta,setMeta]     = useState(0);
  const [loading,setLoading] = useState(false);
  const [visitas,setVisitas] = useState([]);
  const [leads,setLeads]   = useState([]);
  const [ventas,setVentas] = useState([]);
  const metaKey = `${from.slice(0,7)}-${proj}`;

  useEffect(()=>{
    let cancelled=false;
    const load=async()=>{
      setLoading(true);
      try {
        const [v,l,s]=await Promise.all([
          DB.query('visitas',from,to,proj),
          DB.query('leads',from,to,proj),
          DB.query('ventas',from,to,proj),
        ]);
        if (!cancelled){ setVisitas(v); setLeads(l); setVentas(s); }
      } catch(e){ console.error(e); }
      if (!cancelled) setLoading(false);
    };
    load(); return ()=>{ cancelled=true; };
  },[from,to,proj]);

  useEffect(()=>{ DB.getMeta(metaKey).then(v=>setMeta(v)).catch(()=>{}); },[metaKey]);

  const totLeads       = leads.reduce((s,r)=>s+(r.keybe||0)+(r.sico||0),0);
  const totProspectos  = visitas.reduce((s,r)=>s+(r.prospectos||0),0);
  const totCompradores = visitas.reduce((s,r)=>s+(r.compradores||0),0);
  const totVentas      = ventas.reduce((s,r)=>s+(r.ventas||0),0);
  const maxFunnel      = Math.max(totLeads,totProspectos,totVentas,1);

  const byProject = PROJECTS.map(p=>{
    const vR=visitas.filter(r=>r.project===p), lR=leads.filter(r=>r.project===p), sR=ventas.filter(r=>r.project===p);
    return {p,
      l:  lR.reduce((s,r)=>s+(r.keybe||0)+(r.sico||0),0),
      pr: vR.reduce((s,r)=>s+(r.prospectos||0),0),
      c:  vR.reduce((s,r)=>s+(r.compradores||0),0),
      s:  sR.reduce((s,r)=>s+(r.ventas||0),0),
    };
  }).filter(x=>x.l>0||x.pr>0||x.c>0||x.s>0);

  const sel = {padding:'8px 12px',borderRadius:'8px',border:`1.5px solid ${C.sage}`,fontSize:'14px',color:C.dark,background:'white'};
  return (
    <div>
      <div style={{background:'white',borderRadius:'12px',padding:'16px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:'12px',alignItems:'flex-end'}}>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>PROYECTO</label>
            <select value={proj} onChange={e=>setProj(e.target.value)} style={sel}>
              <option value="Todos">Todos</option>
              {PROJECTS.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>DESDE</label>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={sel}/>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>HASTA</label>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={sel}/>
          </div>
        </div>
      </div>

      {loading ? <Spinner/> : <>
        <div style={{display:'flex',flexWrap:'wrap',gap:'12px',marginBottom:'20px'}}>
          <KpiCard label="Total Prospectos" value={totLeads}       color={C.light}/>
          <KpiCard label="Visitas prospectos" value={totProspectos}  color={C.medium}/>
          <KpiCard label="Visitas compradores" value={totCompradores} color={C.dark}/>
          <KpiCard label="Ventas Cerradas" value={totVentas}      color="#D97706"/>
        </div>

        <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
          <div style={{fontWeight:'700',color:C.dark,marginBottom:'20px',fontSize:'15px'}}>Funnel de Conversion</div>
          <FunnelBar label="Prospectos" value={totLeads} max={maxFunnel} color={C.light}/>
          <FunnelBar label="Visitas de prospectos" value={totProspectos} max={maxFunnel} color={C.medium}
            pctLabel={`${pct(totProspectos,totLeads)}% de prospectos llegaron a visita`}/>
          <FunnelBar label="Ventas Cerradas" value={totVentas} max={maxFunnel} color="#D97706"
            pctLabel={`${pct(totVentas,totProspectos)}% de prospectos cerraron venta`}/>
        </div>

        <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
          <div style={{fontWeight:'700',color:C.dark,marginBottom:'16px',fontSize:'15px'}}>Tasas de Conversion</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'12px'}}>
            {[
              {label:'Prospectos → Visitas',  val:pct(totProspectos,totLeads),  sub:`${totProspectos} de ${totLeads}`},
              {label:'Visitas → Ventas',      val:pct(totVentas,totProspectos), sub:`${totVentas} de ${totProspectos}`},
              {label:'Prospectos → Ventas',   val:pct(totVentas,totLeads),      sub:`${totVentas} de ${totLeads}`},
            ].map(({label,val,sub})=>(
              <div key={label} style={{flex:'1',minWidth:'150px',background:C.sageLight,borderRadius:'12px',padding:'16px 20px',textAlign:'center'}}>
                <div style={{fontSize:'11px',color:'#6B7280',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>{label}</div>
                <div style={{fontSize:'36px',fontWeight:'900',color:C.dark,lineHeight:'1'}}>{val}%</div>
                <div style={{fontSize:'12px',color:'#9CA3AF',marginTop:'6px'}}>{sub}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
          <div style={{fontWeight:'700',color:C.dark,marginBottom:'16px',fontSize:'15px'}}>Calculadora de Meta</div>
          <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap',marginBottom:'12px'}}>
            <label style={{fontSize:'14px',fontWeight:'600',color:C.dark}}>Meta de ventas:</label>
            <div style={{padding:'8px 20px',borderRadius:'8px',background:C.sageLight,border:`1.5px solid ${C.sage}`,
              fontSize:'22px',fontWeight:'800',color:meta>0?C.dark:'#9CA3AF',minWidth:'70px',textAlign:'center'}}>
              {meta > 0 ? meta : '—'}
            </div>
            <div style={{fontSize:'12px',color:'#9CA3AF',display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
              <span>{from.slice(0,7)} · {proj}</span>
              <span style={{color:C.medium,cursor:'pointer',fontWeight:'600',textDecoration:'underline'}}
                onClick={onGoToMetas}>
                ✎ Editar en Metas de Venta
              </span>
            </div>
          </div>
          {meta === 0 && (
            <div style={{fontSize:'12px',color:'#D97706',padding:'8px 12px',background:'#FEF3C7',borderRadius:'8px',marginBottom:'12px',borderLeft:'3px solid #D97706'}}>
              No hay meta configurada para este periodo. Ve a la pestaña <strong>Metas de Venta</strong> para establecerla.
            </div>
          )}
          <div style={{display:'flex',flexWrap:'wrap',gap:'12px'}}>
            {[
              {label:'Prospectos necesarios',  val:meta>0&&totVentas>0?Math.ceil(meta*totLeads/totVentas):'—'},
              {label:'Visitas necesarias', val:meta>0&&totVentas>0?Math.ceil(meta*totProspectos/totVentas):'—'},
              {label:'Avance actual',      val:meta>0?`${totVentas} / ${meta}`:'—'},
              {label:'Faltan',             val:meta>0?Math.max(0,meta-totVentas):'—'},
            ].map(({label,val})=>(
              <div key={label} style={{background:C.sageLight,borderRadius:'10px',padding:'14px 18px',flex:'1',minWidth:'120px'}}>
                <div style={{fontSize:'11px',color:'#6B7280',fontWeight:'600',textTransform:'uppercase',marginBottom:'4px'}}>{label}</div>
                <div style={{fontSize:'22px',fontWeight:'800',color:C.dark}}>{val}</div>
              </div>
            ))}

        </div>

        {byProject.length>0 ? (
          <div style={{background:'white',borderRadius:'12px',padding:'24px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)'}}>
            <div style={{fontWeight:'700',color:C.dark,marginBottom:'16px',fontSize:'15px'}}>Comparativo por Proyecto</div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                <thead><tr style={{background:C.sageLight}}>
                  {['Proyecto','Prospectos','Visitas','Compradores','Ventas','P→V','V→C'].map(h=>(
                    <th key={h} style={{padding:'10px 12px',textAlign:'left',fontWeight:'700',color:C.dark}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {byProject.map(({p,l,pr,c,s})=>(
                    <tr key={p} style={{borderBottom:`1px solid ${C.sageLight}`}}>
                      <td style={{padding:'10px 12px',fontWeight:'600',color:C.dark}}>{p}</td>
                      <td style={{padding:'10px 12px',color:C.light,fontWeight:'700'}}>{l}</td>

                      <td style={{padding:'10px 12px',color:'#6B7280'}}>{pct(pr,l)}%</td>
                      <td style={{padding:'10px 12px',color:'#6B7280'}}>{pct(s,pr)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ) : (
          <div style={{textAlign:'center',padding:'48px',color:'#9CA3AF',fontSize:'15px'}}>
            No hay datos para el rango y proyecto seleccionado.
            <br/><span style={{fontSize:'13px'}}>Ingresa registros en Visitas, Leads y Ventas.</span>
          </div>
        )}
      </>}
    </div>
  );
}

function MetasVentasTab() {
  const now = new Date();
  const [year,setYear]           = useState(now.getFullYear());
  const [proj,setProj]           = useState(PROJECTS[0]);
  const [loading,setLoading]     = useState(false);
  const [ventasPorMes,setVentasPorMes] = useState({});
  const [leadsPorMes,setLeadsPorMes]   = useState({});
  const [metas,setMetas]         = useState({});

  useEffect(()=>{
    let cancelled = false;
    const load = async () => {
      setLoading(true);
      try {
        const from = `${year}-01-01`;
        const to   = `${year}-12-31`;
        const metaKeys = Array.from({length:12},(_,i)=>`${year}-${String(i+1).padStart(2,'0')}-${proj}`);
        const [vData, lData, metaBatch] = await Promise.all([
          DB.query('ventas', from, to, proj),
          DB.query('leads',  from, to, proj),
          DB.getMetasBatch(metaKeys),
        ]);
        if (!cancelled) {
          const vByM = {};
          vData.forEach(r=>{ const m=r.date.slice(5,7); vByM[m]=(vByM[m]||0)+(r.ventas||0); });
          setVentasPorMes(vByM);
          const lByM = {};
          lData.forEach(r=>{ const m=r.date.slice(5,7); lByM[m]=(lByM[m]||0)+(r.keybe||0)+(r.sico||0); });
          setLeadsPorMes(lByM);
          const mObj = {};
          metaKeys.forEach((k,i)=>{ mObj[String(i+1).padStart(2,'0')] = metaBatch[k] ?? 0; });
          setMetas(mObj);
        }
      } catch(e){ console.error(e); }
      if (!cancelled) setLoading(false);
    };
    load(); return ()=>{ cancelled=true; };
  },[year,proj]);

  const handleMeta = async (monthStr, val) => {
    const numVal = Math.max(0, Number(val));
    setMetas(m=>({...m,[monthStr]:numVal}));
    try { await DB.saveMeta(`${year}-${monthStr}-${proj}`, numVal); }
    catch(e){ console.error(e); }
  };

  const currentYM = today().slice(0,7);
  const sel = {padding:'8px 12px',borderRadius:'8px',border:`1.5px solid ${C.sage}`,fontSize:'14px',color:C.dark,background:'white'};
  const years = [now.getFullYear()-1, now.getFullYear(), now.getFullYear()+1];

  const totMeta  = Object.values(metas).reduce((s,v)=>s+(v||0),0);
  const totVenta = Object.values(ventasPorMes).reduce((s,v)=>s+(v||0),0);
  const totLeads = Object.values(leadsPorMes).reduce((s,v)=>s+(v||0),0);

  return (
    <div>
      <div style={{background:'white',borderRadius:'12px',padding:'16px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:'12px',alignItems:'flex-end'}}>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>PROYECTO</label>
            <select value={proj} onChange={e=>setProj(e.target.value)} style={sel}>
              {PROJECTS.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:'600',color:'#6B7280',display:'block',marginBottom:'4px'}}>AÑO</label>
            <select value={year} onChange={e=>setYear(Number(e.target.value))} style={sel}>
              {years.map(y=><option key={y}>{y}</option>)}
            </select>
          </div>
        </div>
      </div>

      {loading ? <Spinner/> : (
        <div style={{background:'white',borderRadius:'12px',padding:'20px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)'}}>
          <div style={{fontWeight:'700',color:C.dark,fontSize:'15px',marginBottom:'4px'}}>{proj} — {year}</div>
          <div style={{fontSize:'12px',color:'#9CA3AF',marginBottom:'20px'}}>
            Edita la meta mensual haciendo clic en el campo. Las ventas y porcentajes se actualizan automáticamente.
          </div>

          <div style={{display:'flex',gap:'12px',marginBottom:'20px',flexWrap:'wrap'}}>
            {[
              {label:'Meta anual',    val:totMeta,  color:C.dark},
              {label:'Venta anual',   val:totVenta, color:'#D97706'},
              {label:'Cumplimiento',  val:totMeta>0?`${Math.round(totVenta/totMeta*100)}%`:'—', color:totMeta>0&&totVenta>=totMeta?'#059669':'#DC2626'},
              {label:'Conv. L→V',     val:totLeads>0?`${Math.round(totVenta/totLeads*100)}%`:'—', color:C.medium},
            ].map(({label,val,color})=>(
              <div key={label} style={{flex:'1',minWidth:'110px',background:C.sageLight,borderRadius:'10px',padding:'12px 16px',textAlign:'center'}}>
                <div style={{fontSize:'11px',color:'#6B7280',fontWeight:'600',textTransform:'uppercase',marginBottom:'4px'}}>{label}</div>
                <div style={{fontSize:'22px',fontWeight:'800',color}}>{val}</div>
              </div>
            ))}
          </div>

          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr style={{background:C.dark}}>
                  <th style={{padding:'11px 14px',textAlign:'left',fontWeight:'700',color:'white',borderRadius:'0'}}>Mes</th>
                  <th style={{padding:'11px 14px',textAlign:'center',fontWeight:'700',color:'white'}}>Meta</th>
                  <th style={{padding:'11px 14px',textAlign:'center',fontWeight:'700',color:'white'}}>Venta Real</th>
                  <th style={{padding:'11px 14px',textAlign:'center',fontWeight:'700',color:'white'}}>Cumplimiento</th>
                  <th style={{padding:'11px 14px',textAlign:'center',fontWeight:'700',color:'white'}}>Conv. Leads→Ventas</th>
                </tr>
              </thead>
              <tbody>
                {Array.from({length:12},(_,i)=>{
                  const monthStr = String(i+1).padStart(2,'0');
                  const ym       = `${year}-${monthStr}`;
                  const metaVal  = metas[monthStr] ?? 0;
                  const ventaVal = ventasPorMes[monthStr] || 0;
                  const leadsVal = leadsPorMes[monthStr] || 0;
                  const cumpl    = metaVal > 0 ? Math.round(ventaVal/metaVal*100) : null;
                  const conv     = leadsVal > 0 ? Math.round(ventaVal/leadsVal*100) : null;
                  const isFuture = ym > currentYM;
                  const cumplColor = cumpl === null ? '#9CA3AF' : cumpl >= 100 ? '#059669' : cumpl >= 70 ? '#D97706' : '#DC2626';
                  const isEven   = i % 2 === 0;
                  return (
                    <tr key={monthStr} style={{
                      background: isFuture ? '#FAFAFA' : (isEven ? 'white' : C.sageLight),
                      opacity: isFuture ? 0.55 : 1,
                      borderBottom:`1px solid ${C.sage}`,
                    }}>
                      <td style={{padding:'10px 14px',fontWeight:'600',color:C.dark}}>
                        {MONTHS_ES[i]} {year}
                        {ym===currentYM && <span style={{marginLeft:'8px',fontSize:'10px',background:C.medium,color:'white',padding:'1px 6px',borderRadius:'99px',fontWeight:'700'}}>HOY</span>}
                      </td>
                      <td style={{padding:'8px 14px',textAlign:'center'}}>
                        <input
                          type="number" min="0"
                          value={metaVal}
                          disabled={isFuture}
                          onChange={e=>handleMeta(monthStr, e.target.value)}
                          style={{width:'72px',padding:'6px 8px',borderRadius:'6px',
                            border:`1.5px solid ${isFuture?'#E5E7EB':C.medium}`,
                            fontSize:'15px',fontWeight:'700',textAlign:'center',
                            color:isFuture?'#9CA3AF':C.dark,
                            background:isFuture?'#F3F4F6':C.sageLight,
                            cursor:isFuture?'not-allowed':'text',
                          }}
                        />
                      </td>
                      <td style={{padding:'10px 14px',textAlign:'center',fontWeight:'700',
                        color:ventaVal>0?'#D97706':'#9CA3AF',fontSize:'15px'}}>
                        {ventaVal}
                      </td>
                      <td style={{padding:'10px 14px',textAlign:'center',fontWeight:'700',color:cumplColor,fontSize:'14px'}}>
                        {cumpl !== null ? (
                          <span>
                            {cumpl}%
                            <span style={{display:'block',fontSize:'10px',fontWeight:'500',color:'#9CA3AF',marginTop:'1px'}}>
                              {ventaVal} de {metaVal}
                            </span>
                          </span>
                        ) : '—'}
                      </td>
                      <td style={{padding:'10px 14px',textAlign:'center',fontWeight:'700',
                        color:conv!==null?C.medium:'#9CA3AF',fontSize:'14px'}}>
                        {conv !== null ? (
                          <span>
                            {conv}%
                            <span style={{display:'block',fontSize:'10px',fontWeight:'500',color:'#9CA3AF',marginTop:'1px'}}>
                              {ventaVal} de {leadsVal}
                            </span>
                          </span>
                        ) : '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{background:C.dark}}>
                  <td style={{padding:'11px 14px',fontWeight:'700',color:'white'}}>Total {year}</td>
                  <td style={{padding:'11px 14px',textAlign:'center',fontWeight:'800',color:'white',fontSize:'15px'}}>{totMeta}</td>
                  <td style={{padding:'11px 14px',textAlign:'center',fontWeight:'800',color:'#F0EBE0',fontSize:'15px'}}>{totVenta}</td>
                  <td style={{padding:'11px 14px',textAlign:'center',fontWeight:'800',fontSize:'15px',
                    color:totMeta>0&&totVenta>=totMeta?'#6EE7B7':'#FCA5A5'}}>
                    {totMeta>0?`${Math.round(totVenta/totMeta*100)}%`:'—'}
                  </td>
                  <td style={{padding:'11px 14px',textAlign:'center',fontWeight:'800',color:'#A7F3D0',fontSize:'15px'}}>
                    {totLeads>0?`${Math.round(totVenta/totLeads*100)}%`:'—'}
                  </td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

const TABS = [
  {id:'visitas',   label:'Visitas'},
  {id:'leads',     label:'Prospectos'},
  {id:'ventas',    label:'Ventas'},
  {id:'metas',     label:'Metas de Venta'},
  {id:'dashboard', label:'Dashboard'},
];

function App() {
  const [tab,setTab] = useState('visitas');
  return (
    <div style={{minHeight:'100vh',background:C.cream}}>
      <div style={{background:C.dark,padding:'16px 24px',boxShadow:'0 2px 8px rgba(26,77,92,0.25)'}}>
        <div style={{maxWidth:'860px',margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <TGLogo/>
          <div style={{fontSize:'11px',color:'rgba(200,213,200,0.7)',fontWeight:'500',letterSpacing:'0.5px',textAlign:'right'}}>
            Funnel de Ventas<br/><span style={{fontSize:'10px'}}>v2.1 — Metas de Venta</span>
          </div>
        </div>
      </div>
      <div style={{background:C.dark,borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{maxWidth:'860px',margin:'0 auto',display:'flex',overflowX:'auto'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:'13px 8px',border:'none',cursor:'pointer',
              fontSize:'12px',fontWeight:'700',letterSpacing:'0.3px',whiteSpace:'nowrap',
              background:tab===t.id?C.medium:'transparent',
              color:tab===t.id?'white':'rgba(200,213,200,0.65)',
              borderBottom:tab===t.id?`3px solid ${C.light}`:'3px solid transparent',
              transition:'all 0.15s',
            }}>{t.label}</button>
          ))}
        </div>
      </div>
      <div style={{maxWidth:'860px',margin:'0 auto',padding:'24px 16px'}}>
        {tab==='visitas'   && <VisitasTab/>}
        {tab==='leads'     && <LeadsTab/>}
        {tab==='ventas'    && <VentasTab/>}
        {tab==='metas'     && <MetasVentasTab/>}
        {tab==='dashboard' && <DashboardTab onGoToMetas={()=>setTab('metas')}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
